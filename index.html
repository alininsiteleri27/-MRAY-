<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Okul Projesi | GitHub Pages</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6C5CE7;
            --secondary: #00D9FF;
            --accent: #FF6B6B;
            --dark: #0F0F1A;
            --light: #F8F9FA;
            --gradient: linear-gradient(135deg, #6C5CE7 0%, #00D9FF 100%);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background: var(--dark);
            color: var(--light);
            overflow-x: hidden;
            line-height: 1.6;
        }

        /* Giriş Ekranı (Login) */
        .login-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--dark);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            transition: opacity 0.5s, visibility 0.5s;
        }

        .login-screen.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .login-container {
            text-align: center;
            max-width: 600px;
            padding: 2rem;
        }

        .login-title {
            font-size: 3rem;
            margin-bottom: 1rem;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .login-subtitle {
            color: rgba(255,255,255,0.7);
            margin-bottom: 3rem;
            font-size: 1.2rem;
        }

        .class-selection {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1.5rem;
            max-width: 400px;
            margin: 0 auto;
        }

        .class-btn {
            padding: 2rem;
            background: rgba(255,255,255,0.05);
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            color: white;
            font-size: 2rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .class-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--gradient);
            opacity: 0;
            transition: opacity 0.3s;
            z-index: -1;
        }

        .class-btn:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
            box-shadow: 0 10px 30px rgba(108, 92, 231, 0.3);
        }

        .class-btn:hover::before {
            opacity: 0.2;
        }

        .class-btn.active {
            background: var(--gradient);
            border-color: transparent;
            box-shadow: 0 10px 30px rgba(108, 92, 231, 0.5);
        }

        .class-label {
            display: block;
            font-size: 0.9rem;
            margin-top: 0.5rem;
            opacity: 0.7;
            font-weight: 400;
        }

        .login-btn {
            margin-top: 2rem;
            padding: 1rem 3rem;
            background: var(--gradient);
            border: none;
            border-radius: 50px;
            color: white;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.3s;
            pointer-events: none;
        }

        .login-btn.visible {
            opacity: 1;
            transform: translateY(0);
            pointer-events: all;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(108, 92, 231, 0.4);
        }

        /* Ana Uygulama */
        .app-container {
            opacity: 0;
            transition: opacity 0.5s;
        }

        .app-container.visible {
            opacity: 1;
        }

        /* Top Bar */
        .top-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 70px;
            background: rgba(15, 15, 26, 0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 5%;
            z-index: 1000;
        }

        /* Sol Üst - Profil */
        .profile-section {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .profile-avatar {
            width: 45px;
            height: 45px;
            background: var(--gradient);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1.2rem;
            border: 2px solid rgba(255,255,255,0.2);
        }

        .profile-info {
            display: flex;
            flex-direction: column;
        }

        .profile-class {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--secondary);
        }

        .profile-role {
            font-size: 0.8rem;
            color: rgba(255,255,255,0.6);
        }

        /* Sağ Üst - Menü Butonu */
        .menu-btn {
            width: 50px;
            height: 50px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 5px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .menu-btn:hover {
            background: rgba(255,255,255,0.1);
            border-color: var(--secondary);
        }

        .menu-btn span {
            width: 24px;
            height: 3px;
            background: white;
            border-radius: 2px;
            transition: all 0.3s;
        }

        .menu-btn.active span:nth-child(1) {
            transform: rotate(45deg) translate(5px, 5px);
        }

        .menu-btn.active span:nth-child(2) {
            opacity: 0;
        }

        .menu-btn.active span:nth-child(3) {
            transform: rotate(-45deg) translate(5px, -5px);
        }

        /* Yan Menü (Sidebar) */
        .sidebar {
            position: fixed;
            top: 70px;
            right: -100%;
            width: 300px;
            height: calc(100% - 70px);
            background: rgba(15, 15, 26, 0.98);
            backdrop-filter: blur(20px);
            border-left: 1px solid rgba(255,255,255,0.1);
            transition: right 0.3s;
            z-index: 999;
            padding: 2rem;
        }

        .sidebar.open {
            right: 0;
        }

        .sidebar-menu {
            list-style: none;
        }

        .sidebar-menu li {
            margin-bottom: 1rem;
        }

        .sidebar-menu a {
            display: block;
            padding: 1rem;
            color: white;
            text-decoration: none;
            border-radius: 12px;
            transition: all 0.3s;
            border: 1px solid transparent;
        }

        .sidebar-menu a:hover {
            background: rgba(108, 92, 231, 0.2);
            border-color: var(--primary);
            transform: translateX(5px);
        }

        .sidebar-divider {
            height: 1px;
            background: rgba(255,255,255,0.1);
            margin: 2rem 0;
        }

        .logout-btn {
            width: 100%;
            padding: 1rem;
            background: rgba(255, 107, 107, 0.2);
            border: 1px solid var(--accent);
            border-radius: 12px;
            color: var(--accent);
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
        }

        .logout-btn:hover {
            background: var(--accent);
            color: white;
        }

        /* Ana İçerik */
        .main-content {
            margin-top: 70px;
            min-height: calc(100vh - 70px);
        }

        /* Diğer Stiller (Önceki koddan devam) */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .bg-animation span {
            position: absolute;
            width: 50px;
            height: 50px;
            background: rgba(108, 92, 231, 0.1);
            border-radius: 50%;
            animation: float 15s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); opacity: 0.3; }
            50% { transform: translateY(-100vh) rotate(360deg); opacity: 0.8; }
        }

        .hero {
            min-height: calc(100vh - 70px);
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 0 5%;
        }

        .hero-content h1 {
            font-size: clamp(2rem, 6vw, 4rem);
            margin-bottom: 1rem;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .class-selection {
                grid-template-columns: 1fr;
            }
            
            .sidebar {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <!-- Giriş Ekranı -->
    <div class="login-screen" id="loginScreen">
        <div class="login-container">
            <h1 class="login-title">Hoş Geldiniz</h1>
            <p class="login-subtitle">Sınıfınızı seçerek devam edin</p>
            
            <div class="class-selection">
                <button class="class-btn" data-class="9">
                    9
                    <span class="class-label">9. Sınıf</span>
                </button>
                <button class="class-btn" data-class="10">
                    10
                    <span class="class-label">10. Sınıf</span>
                </button>
                <button class="class-btn" data-class="11">
                    11
                    <span class="class-label">11. Sınıf</span>
                </button>
                <button class="class-btn" data-class="12">
                    12
                    <span class="class-label">12. Sınıf</span>
                </button>
            </div>
            
            <button class="login-btn" id="loginBtn">Devam Et →</button>
        </div>
    </div>

    <!-- Ana Uygulama -->
    <div class="app-container" id="appContainer">
        <!-- Animated Background -->
        <div class="bg-animation" id="bgAnimation"></div>

        <!-- Top Bar -->
        <header class="top-bar">
            <!-- Sol Üst - Profil -->
            <div class="profile-section">
                <div class="profile-avatar" id="profileAvatar">9</div>
                <div class="profile-info">
                    <span class="profile-class" id="profileClass">9. Sınıf</span>
                    <span class="profile-role">Öğrenci</span>
                </div>
            </div>

            <!-- Sağ Üst - Menü Butonu -->
            <button class="menu-btn" id="menuBtn">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </header>

        <!-- Yan Menü -->
        <nav class="sidebar" id="sidebar">
            <ul class="sidebar-menu">
                <li><a href="#home">🏠 Ana Sayfa</a></li>
                <li><a href="#documents">📄 Belgeler</a></li>
                <li><a href="#games">🎮 Oyunlar</a></li>
                <li><a href="#resources">📚 Kaynaklar</a></li>
                <li><a href="#settings">⚙️ Ayarlar</a></li>
            </ul>
            
            <div class="sidebar-divider"></div>
            
            <button class="logout-btn" id="logoutBtn">🚪 Çıkış Yap</button>
        </nav>

        <!-- Ana İçerik -->
        <main class="main-content">
            <section class="hero" id="home">
                <div class="hero-content">
                    <h1 id="welcomeText">9. Sınıf Platformu</h1>
                    <p>Belge ve oyun içeriklerine erişmek için menüyü kullanın.</p>
                </div>
            </section>
        </main>
    </div>

    <script>
        // Sınıf Seçimi ve Login
        const classBtns = document.querySelectorAll('.class-btn');
        const loginBtn = document.getElementById('loginBtn');
        const loginScreen = document.getElementById('loginScreen');
        const appContainer = document.getElementById('appContainer');
        
        let selectedClass = null;

        // Sınıf butonlarına tıklama
        classBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                // Aktif sınıfı kaldır
                classBtns.forEach(b => b.classList.remove('active'));
                // Yeni sınıfı aktif et
                btn.classList.add('active');
                selectedClass = btn.dataset.class;
                // Giriş butonunu göster
                loginBtn.classList.add('visible');
            });
        });

        // Giriş yap
        loginBtn.addEventListener('click', () => {
            if (selectedClass) {
                // localStorage'a kaydet
                localStorage.setItem('userClass', selectedClass);
                
                // Ekran geçişi
                loginScreen.classList.add('hidden');
                setTimeout(() => {
                    appContainer.classList.add('visible');
                    initializeApp(selectedClass);
                }, 500);
            }
        });

        // Uygulamayı başlat
        function initializeApp(userClass) {
            // Profil bilgilerini güncelle
            document.getElementById('profileAvatar').textContent = userClass;
            document.getElementById('profileClass').textContent = userClass + '. Sınıf';
            document.getElementById('welcomeText').textContent = userClass + '. Sınıf Platformu';
            
            // Arka plan animasyonu
            const bgAnimation = document.getElementById('bgAnimation');
            for (let i = 0; i < 15; i++) {
                const span = document.createElement('span');
                span.style.left = Math.random() * 100 + '%';
                span.style.animationDelay = Math.random() * 15 + 's';
                span.style.animationDuration = (Math.random() * 10 + 10) + 's';
                bgAnimation.appendChild(span);
            }
        }

        // Menü butonu
        const menuBtn = document.getElementById('menuBtn');
        const sidebar = document.getElementById('sidebar');

        menuBtn.addEventListener('click', () => {
            menuBtn.classList.toggle('active');
            sidebar.classList.toggle('open');
        });

        // Çıkış yap
        document.getElementById('logoutBtn').addEventListener('click', () => {
            localStorage.removeItem('userClass');
            location.reload();
        });

        // Sayfa yüklenince kontrol et
        window.addEventListener('load', () => {
            const savedClass = localStorage.getItem('userClass');
            if (savedClass) {
                // Önceki oturum varsa direkt aç
                loginScreen.classList.add('hidden');
                appContainer.classList.add('visible');
                initializeApp(savedClass);
            }
        });

        // Menü linklerine tıklayınca kapat
        document.querySelectorAll('.sidebar-menu a').forEach(link => {
            link.addEventListener('click', () => {
                menuBtn.classList.remove('active');
                sidebar.classList.remove('open');
            });
        });
    </script>
</body>
</html>
